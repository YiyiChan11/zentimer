<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenTimer Floating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #container {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      /* background-alpha is set dynamically by setOpacityLevel() */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      /* border-alpha set dynamically */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      transition: background 0.35s ease, border-color 0.35s ease,
                  box-shadow 0.35s ease, opacity 0.35s ease;
      /* box-shadow set dynamically */
      position: relative;
    }
    #container:active { cursor: grabbing; }
    #container:hover { background: rgba(28, 28, 34, 0.88); }
    #container.focus {
      border-color: rgba(245, 158, 11, 0.3);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.15);
    }
    #container.break {
      border-color: rgba(45, 212, 191, 0.3);
      box-shadow: 0 8px 32px rgba(45, 212, 191, 0.15);
    }
    #container.paused {
      opacity: 0.55;
      filter: grayscale(0.35);
    }
    /* Keep text legible even when container is dimmed */
    #container.paused #time {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 0 16px rgba(255, 255, 255, 0.2);
    }
    #time {
      font-size: 28px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      /* text-shadow glow makes text pop against low-opacity container */
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 24px rgba(255, 255, 255, 0.3);
      /* opacity set dynamically by setOpacityLevel() — always > container */
    }
    #phase {
      font-size: 10px;
      color: #d6d3d1;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.35);
      /* opacity set dynamically by setOpacityLevel() */
    }
    #container.focus #phase { color: #fbbf24; }
    #container.break #phase { color: #2dd4bf; }
    #progress-ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #close-btn {
      position: absolute;
      top: 4px; right: 4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      z-index: 10;
    }
    #container:hover #close-btn { opacity: 1; }
    #close-btn:hover {
      background: rgba(255, 80, 80, 0.4);
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div id="container">
    <svg id="progress-ring" viewBox="0 0 160 80">
      <rect x="2" y="2" width="156" height="76" rx="14"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
      <rect id="progress-bar" x="2" y="2" width="0" height="76" rx="14"
        fill="none" stroke="rgba(245, 158, 11, 0.5)" stroke-width="2" />
    </svg>
    <div id="time">25:00</div>
    <div id="phase">Ready</div>
    <button id="close-btn" title="Close">&times;</button>
  </div>

  <script>
    // ── DOM refs ──
    var container = document.getElementById('container');
    var timeEl = document.getElementById('time');
    var phaseEl = document.getElementById('phase');
    var progressBar = document.getElementById('progress-bar');
    var closeBtn = document.getElementById('close-btn');

    // ── Current raw opacity level (0–1) for style recalc on phase change ──
    var _currentRaw = 1.0;

    // ── Two-layer opacity system ──
    // Called by Rust set_floating_opacity command via window.eval().
    // raw in [0, 1] is the slider value (0% - 100%).
    //
    // Layer 1 (Win32, set in Rust): window alpha = 0.15 + raw * 0.85
    //   -> At slider 0%: everything is at least 15% visible
    //
    // Layer 2 (CSS, here): per-element fine-tuning so text reads brighter
    //   than the frame:
    //     Container bg alpha:  0.08 + raw * 0.64  (ghostly->solid)
    //     Text opacity:         0.90 + raw * 0.10  (always high)
    //     Phase opacity:        0.65 + raw * 0.35
    //
    // Effective brightness examples:
    //   raw=0 (slider 0%):
    //     win=15%, bg_eff~1.2%, time_eff~13.5%, phase_eff~9.8%
    //     -> ghostly rectangle, readable digits
    //   raw=1 (slider 100%):
    //     win=100%, bg=72%, time=100%, phase=100%
    //     -> fully solid window
    window.setOpacityLevel = function(raw) {
      _currentRaw = Math.max(0, Math.min(1, raw));

      // Container shape -- fades more aggressively than the window
      var bgAlpha = (0.08 + _currentRaw * 0.64).toFixed(2);       // 0.08 -> 0.72
      var borderAlpha = (0.01 + _currentRaw * 0.09).toFixed(2);    // 0.01 -> 0.10
      var shadowAlpha = (0.08 + _currentRaw * 0.42).toFixed(2);    // 0.08 -> 0.50

      // Text -- stays consistently brighter than the shape (~8-12 pts ahead)
      var timeOp = (0.90 + _currentRaw * 0.10).toFixed(2);         // 0.90 -> 1.00
      var phaseOp = (0.65 + _currentRaw * 0.35).toFixed(2);        // 0.65 -> 1.00

      // Glow intensity scales with raw so text "pops" more at low opacities
      var glowA = (0.7 - _currentRaw * 0.15).toFixed(2);           // 0.70 -> 0.55

      container.style.background = 'rgba(18, 18, 22, ' + bgAlpha + ')';
      container.style.borderColor = 'rgba(255, 255, 255, ' + borderAlpha + ')';
      container.style.boxShadow = '0 8px 32px rgba(0, 0, 0, ' + shadowAlpha + ')';

      timeEl.style.opacity = timeOp;
      timeEl.style.textShadow =
        '0 0 10px rgba(255, 255, 255, ' + glowA + '), ' +
        '0 0 24px rgba(255, 255, 255, ' + (glowA * 0.45).toFixed(2) + ')';

      phaseEl.style.opacity = phaseOp;
    };

    // Initialise to full opacity (default)
    setOpacityLevel(1.0);

    // ── IPC helper: uses __TAURI_INTERNALS__ (always available in Tauri 2.0) ──
    function invoke(cmd, args) {
      return window.__TAURI_INTERNALS__.invoke(cmd, args);
    }

    // ── Called by Rust backend via window.eval() to update timer display ──
    window.updateDisplay = function(data) {
      timeEl.textContent = data.time;

      var phaseMap = {
        focus: 'Focus',
        break: 'Break',
        buffer: 'Buffer',
        idle: 'Ready',
        paused: 'Paused',
      };
      phaseEl.textContent = phaseMap[data.phase] || data.phase;

      // Phase styling
      container.className = '';
      if (data.phase === 'focus') container.classList.add('focus');
      else if (data.phase === 'break' || data.phase === 'buffer') container.classList.add('break');
      else if (data.phase === 'paused') container.classList.add('paused');

      // Re-apply current opacity level (phase class may override inline styles)
      setOpacityLevel(_currentRaw);

      // Progress bar (0-1 -> 0-156)
      progressBar.setAttribute('width', String(156 * data.progress));

      // Progress bar color
      if (data.phase === 'break' || data.phase === 'buffer') {
        progressBar.setAttribute('stroke', 'rgba(45, 212, 191, 0.5)');
      } else {
        progressBar.setAttribute('stroke', 'rgba(245, 158, 11, 0.5)');
      }
    };

    // ── Interactions ──
    // Single tap  -> pause / resume  (floating_toggle_timer)
    // Double tap  -> open main window (floating_show_main)
    // Long press  -> drag the window  (drag_floating_window)
    // x button    -> close floating window
    var pressInfo = null;   // { x, y, longTimer }
    var dragging = false;
    var moved = false;
    var lastTap = 0;
    var tapTimer = null;
    var LONG_PRESS_MS = 350;
    var MOVE_THRESHOLD = 5;
    var DOUBLE_TAP_MS = 300;
    var SINGLE_TAP_DELAY = 280;

    function startDrag() {
      if (dragging) return;
      dragging = true;
      invoke('drag_floating_window').catch(function(){});
    }

    function resetPress() {
      if (pressInfo) clearTimeout(pressInfo.longTimer);
      pressInfo = null;
      dragging = false;
    }

    container.addEventListener('pointerdown', function(e) {
      if (e.target === closeBtn) return; // let close button handle itself
      pressInfo = { x: e.clientX, y: e.clientY };
      moved = false;
      var timer = setTimeout(function() {
        startDrag(); // long press -> drag
      }, LONG_PRESS_MS);
      pressInfo.longTimer = timer;
    });

    window.addEventListener('pointermove', function(e) {
      if (!pressInfo) return;
      var dx = e.clientX - pressInfo.x;
      var dy = e.clientY - pressInfo.y;
      if (Math.hypot(dx, dy) > MOVE_THRESHOLD) moved = true;
      if (!dragging && moved) {
        clearTimeout(pressInfo.longTimer);
        startDrag(); // moved before long-press fired -> drag
      }
    });

    function endPress() {
      if (!pressInfo) return;
      clearTimeout(pressInfo.longTimer);
      var wasDragging = dragging;
      dragging = false;
      pressInfo = null;
      if (wasDragging || moved) return; // a drag or stray move, not a tap

      var now = Date.now();
      if (now - lastTap < DOUBLE_TAP_MS) {
        // Double tap -> open main window
        lastTap = 0;
        if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
        invoke('floating_show_main').catch(function(){});
      } else {
        // Single tap -> pause / resume (after a short delay to detect double tap)
        lastTap = now;
        tapTimer = setTimeout(function() {
          tapTimer = null;
          invoke('floating_toggle_timer').catch(function(){});
        }, SINGLE_TAP_DELAY);
      }
    }

    window.addEventListener('pointerup', endPress);
    window.addEventListener('pointercancel', resetPress);
    window.addEventListener('blur', resetPress);

    // ── Close button ──
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      invoke('close_floating_window').catch(function(){});
    });
  </script>
</body>
</html>
