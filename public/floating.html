<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenTimer Floating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #container {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      background: rgba(18, 18, 22, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    #container:active { cursor: grabbing; }
    #container:hover { background: rgba(28, 28, 34, 0.95); }
    #container.focus {
      border-color: rgba(245, 158, 11, 0.3);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.15);
    }
    #container.break {
      border-color: rgba(45, 212, 191, 0.3);
      box-shadow: 0 8px 32px rgba(45, 212, 191, 0.15);
    }
    #time {
      font-size: 28px;
      font-weight: 300;
      color: #f5f5f4;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    #phase {
      font-size: 10px;
      color: #a8a29e;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    #container.focus #phase { color: #fbbf24; }
    #container.break #phase { color: #2dd4bf; }
    #progress-ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #close-btn {
      position: absolute;
      top: 4px; right: 4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s, background 0.2s;
      z-index: 10;
    }
    #container:hover #close-btn { opacity: 1; }
    #close-btn:hover {
      background: rgba(255, 80, 80, 0.4);
      color: rgba(255, 255, 255, 0.9);
    }
  </style>
</head>
<body>
  <div id="container">
    <svg id="progress-ring" viewBox="0 0 160 80">
      <rect x="2" y="2" width="156" height="76" rx="14"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
      <rect id="progress-bar" x="2" y="2" width="0" height="76" rx="14"
        fill="none" stroke="rgba(245, 158, 11, 0.5)" stroke-width="2" />
    </svg>
    <div id="time">25:00</div>
    <div id="phase">Ready</div>
    <button id="close-btn" title="Close">&times;</button>
  </div>

  <script>
    // ── DOM refs ──
    var container = document.getElementById('container');
    var timeEl = document.getElementById('time');
    var phaseEl = document.getElementById('phase');
    var progressBar = document.getElementById('progress-bar');
    var closeBtn = document.getElementById('close-btn');

    // ── IPC helper: uses __TAURI_INTERNALS__ (always available in Tauri 2.0) ──
    function invoke(cmd, args) {
      return window.__TAURI_INTERNALS__.invoke(cmd, args);
    }

    // ── Called by Rust backend via window.eval() to update timer display ──
    window.updateDisplay = function(data) {
      timeEl.textContent = data.time;

      var phaseMap = {
        focus: 'Focus',
        break: 'Break',
        buffer: 'Buffer',
        idle: 'Ready',
      };
      phaseEl.textContent = phaseMap[data.phase] || data.phase;

      // Phase styling
      container.className = '';
      if (data.phase === 'focus') container.classList.add('focus');
      else if (data.phase === 'break' || data.phase === 'buffer') container.classList.add('break');

      // Progress bar (0-1 -> 0-156)
      progressBar.setAttribute('width', String(156 * data.progress));

      // Progress bar color
      if (data.phase === 'break' || data.phase === 'buffer') {
        progressBar.setAttribute('stroke', 'rgba(45, 212, 191, 0.5)');
      } else {
        progressBar.setAttribute('stroke', 'rgba(245, 158, 11, 0.5)');
      }
    };

    // ── Drag: hold and move to drag the borderless window ──
    var mouseDownPos = null;
    var isDragging = false;

    container.addEventListener('mousedown', function(e) {
      if (e.target === closeBtn) return;
      mouseDownPos = { x: e.screenX, y: e.screenY };
    });

    container.addEventListener('mousemove', function(e) {
      if (!mouseDownPos || isDragging) return;
      var dx = Math.abs(e.screenX - mouseDownPos.x);
      var dy = Math.abs(e.screenY - mouseDownPos.y);
      if (dx > 3 || dy > 3) {
        isDragging = true;
        invoke('drag_floating_window').catch(function(){});
      }
    });

    container.addEventListener('mouseup', function() {
      mouseDownPos = null;
      setTimeout(function() { isDragging = false; }, 100);
    });

    // ── Close button ──
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      invoke('close_floating_window').catch(function(){});
    });

    // ── Double-click anywhere to close ──
    var clickCount = 0;
    var clickTimer = null;

    container.addEventListener('click', function(e) {
      if (e.target === closeBtn) return;
      if (isDragging) return;
      clickCount++;
      if (clickCount === 1) {
        clickTimer = setTimeout(function() { clickCount = 0; }, 300);
      } else if (clickCount === 2) {
        clearTimeout(clickTimer);
        clickCount = 0;
        invoke('close_floating_window').catch(function(){});
      }
    });
  </script>
</body>
</html>
