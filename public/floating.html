<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenTimer Floating</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Inter', -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }
    #container {
      width: 100%;
      height: 100%;
      border-radius: 16px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      transition: background 0.35s ease, border-color 0.35s ease,
                  box-shadow 0.35s ease, opacity 0.35s ease;
      position: relative;
    }
    #container:active { cursor: grabbing; }
    #container:hover { background: rgba(28, 28, 34, 0.88); }
    #container.focus {
      border-color: rgba(245, 158, 11, 0.3);
      box-shadow: 0 8px 32px rgba(245, 158, 11, 0.15);
    }
    #container.break {
      border-color: rgba(45, 212, 191, 0.3);
      box-shadow: 0 8px 32px rgba(45, 212, 191, 0.15);
    }
    #container.paused {
      opacity: 0.55;
      filter: grayscale(0.35);
    }
    /* Keep text legible even when container is dimmed */
    #container.paused #time {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.4), 0 0 16px rgba(255, 255, 255, 0.2);
    }
    /* ── Locked state: all interactions disabled ── */
    #container.locked {
      pointer-events: none !important;
      cursor: default !important;
    }
    #time {
      font-size: 28px;
      font-weight: 300;
      color: #ffffff;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 24px rgba(255, 255, 255, 0.3);
    }
    #phase {
      font-size: 10px;
      color: #d6d3d1;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.35);
    }
    #container.focus #phase { color: #fbbf24; }
    #container.break #phase { color: #2dd4bf; }
    #progress-ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ── Action buttons (close + lock) — 24px (1.5x original) ── */
    .action-btn {
      position: absolute;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.10);
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s, background 0.2s;
      z-index: 10;
    }
    .action-btn:hover {
      background: rgba(255, 80, 80, 0.40);
      color: rgba(255, 255, 255, 0.9);
    }
    /* Lock button specific hover */
    #lock-btn:hover {
      background: rgba(245, 158, 11, 0.30);
      color: #fbbf24;
    }
    #lock-btn.locked:hover {
      background: rgba(99, 160, 157, 0.30);
      color: #2dd4bf;
    }

    #close-btn {
      top: 4px; right: 4px;
    }
    #lock-btn {
      bottom: 4px; right: 4px;
    }
    #container:not(:hover) #close-btn,
    #container:not(:hover) #lock-btn {
      opacity: 0;
    }
    #container:hover #close-btn,
    #container:hover #lock-btn {
      opacity: 1;
    }

    /* SVG icons for buttons */
    .action-btn svg {
      display: block;
    }
  </style>
</head>
<body>
  <div id="container">
    <svg id="progress-ring" viewBox="0 0 160 80">
      <rect x="2" y="2" width="156" height="76" rx="14"
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" />
      <rect id="progress-bar" x="2" y="2" width="0" height="76" rx="14"
        fill="none" stroke="rgba(245, 158, 11, 0.5)" stroke-width="2" />
    </svg>
    <div id="time">25:00</div>
    <div id="phase">Ready</div>

    <!-- Close button (top-right) -->
    <button id="close-btn" class="action-btn" title="Close">
      <!-- Simple × -->
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M3 3l8 8M11 3L3 11"/>
      </svg>
    </button>

    <!-- Lock button (bottom-right) -->
    <button id="lock-btn" class="action-btn" title="Lock floating window">
      <!-- Unlocked padlock icon -->
      <svg id="lock-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <!-- Unlocked state -->
        <rect x="3" y="7" width="10" height="8" rx="1.5" />
        <path d="M5 7V5a3 3 0 0 1 6 0v2" class="shackle-open" />
        <!-- Hidden locked shackle (shown via JS toggle) -->
        <path d="M5 7V5a3 3 0 0 1 6 0v0" class="shackle-closed" style="display:none" />
      </svg>
    </button>
  </div>

  <script>
    // ── DOM refs ──
    var container = document.getElementById('container');
    var timeEl = document.getElementById('time');
    var phaseEl = document.getElementById('phase');
    var progressBar = document.getElementById('progress-bar');
    var closeBtn = document.getElementById('close-btn');
    var lockBtn = document.getElementById('lock-btn');
    var lockIconShackleOpen = lockBtn.querySelector('.shackle-open');
    var lockIconShackleClosed = lockBtn.querySelector('.shackle-closed');

    // ── Current raw opacity level (0–1) for style recalc on phase change ──
    var _currentRaw = 1.0;

    // ── Two-layer opacity system ──
    window.setOpacityLevel = function(raw) {
      _currentRaw = Math.max(0, Math.min(1, raw));

      var bgAlpha = (0.08 + _currentRaw * 0.64).toFixed(2);
      var borderAlpha = (0.01 + _currentRaw * 0.09).toFixed(2);
      var shadowAlpha = (0.08 + _currentRaw * 0.42).toFixed(2);

      var timeOp = (0.90 + _currentRaw * 0.10).toFixed(2);
      var phaseOp = (0.65 + _currentRaw * 0.35).toFixed(2);

      var glowA = (0.7 - _currentRaw * 0.15).toFixed(2);

      container.style.background = 'rgba(18, 18, 22, ' + bgAlpha + ')';
      container.style.borderColor = 'rgba(255, 255, 255, ' + borderAlpha + ')';
      container.style.boxShadow = '0 8px 32px rgba(0, 0, 0, ' + shadowAlpha + ')';

      timeEl.style.opacity = timeOp;
      timeEl.style.textShadow =
        '0 0 10px rgba(255, 255, 255, ' + glowA + '), ' +
        '0 0 24px rgba(255, 255, 255, ' + (glowA * 0.45).toFixed(2) + ')';

      phaseEl.style.opacity = phaseOp;
    };

    // Initialise to full opacity (default)
    setOpacityLevel(1.0);

    // ── Lock/Unlock state ──
    // When locked: container gets pointer-events:none (no drag/click/tap).
    // The lock button itself remains clickable so user can unlock from the
    // floating window too (not just the main app settings).
    var _locked = false;

    window.setLockedState = function(locked) {
      _locked = !!locked;
      if (_locked) {
        container.classList.add('locked');
        lockBtn.classList.add('locked');
        lockBtn.title = 'Unlock floating window';
        lockIconShackleOpen.style.display = 'none';
        lockIconShackleClosed.style.display = '';
      } else {
        container.classList.remove('locked');
        lockBtn.classList.remove('locked');
        lockBtn.title = 'Lock floating window';
        lockIconShackleOpen.style.display = '';
        lockIconShackleClosed.style.display = 'none';
      }
    };

    // Toggle lock when clicking the lock button on the floating window
    lockBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      _locked = !_locked;
      setLockedState(_locked);
      invoke('set_floating_locked', { locked: _locked }).catch(function(){});
    });

    // Initialise to unlocked
    setLockedState(false);

    // ── IPC helper ──
    function invoke(cmd, args) {
      return window.__TAURI_INTERNALS__.invoke(cmd, args);
    }

    // ── Called by Rust backend via window.eval() to update timer display ──
    window.updateDisplay = function(data) {
      timeEl.textContent = data.time;

      var phaseMap = {
        focus: 'Focus',
        break: 'Break',
        buffer: 'Buffer',
        idle: 'Ready',
        paused: 'Paused',
      };
      phaseEl.textContent = phaseMap[data.phase] || data.phase;

      container.className = _locked ? 'locked' : '';
      if (data.phase === 'focus') container.classList.add('focus');
      else if (data.phase === 'break' || data.phase === 'buffer') container.classList.add('break');
      else if (data.phase === 'paused') container.classList.add('paused');

      // Re-apply current opacity level (phase class may override inline styles)
      setOpacityLevel(_currentRaw);

      progressBar.setAttribute('width', String(156 * data.progress));

      if (data.phase === 'break' || data.phase === 'buffer') {
        progressBar.setAttribute('stroke', 'rgba(45, 212, 191, 0.5)');
      } else {
        progressBar.setAttribute('stroke', 'rgba(245, 158, 11, 0.5)');
      }
    };

    // ── Interactions (only active when not locked) ──
    var pressInfo = null;
    var dragging = false;
    var moved = false;
    var lastTap = 0;
    var tapTimer = null;
    var LONG_PRESS_MS = 350;
    var MOVE_THRESHOLD = 5;
    var DOUBLE_TAP_MS = 300;
    var SINGLE_TAP_DELAY = 280;

    function startDrag() {
      if (dragging || _locked) return;
      dragging = true;
      invoke('drag_floating_window').catch(function(){});
    }

    function resetPress() {
      if (pressInfo) clearTimeout(pressInfo.longTimer);
      pressInfo = null;
      dragging = false;
    }

    // Guard: ignore interactions when locked
    function isLocked() { return _locked; }

    container.addEventListener('pointerdown', function(e) {
      if (isLocked()) return;
      if (e.target === closeBtn || e.target === lockBtn) return;
      pressInfo = { x: e.clientX, y: e.clientY };
      moved = false;
      var timer = setTimeout(function() {
        startDrag();
      }, LONG_PRESS_MS);
      pressInfo.longTimer = timer;
    });

    window.addEventListener('pointermove', function(e) {
      if (!pressInfo) return;
      var dx = e.clientX - pressInfo.x;
      var dy = e.clientY - pressInfo.y;
      if (Math.hypot(dx, dy) > MOVE_THRESHOLD) moved = true;
      if (!dragging && moved) {
        clearTimeout(pressInfo.longTimer);
        startDrag();
      }
    });

    function endPress() {
      if (!pressInfo) return;
      clearTimeout(pressInfo.longTimer);
      var wasDragging = dragging;
      dragging = false;
      pressInfo = null;
      if (wasDragging || moved || isLocked()) return;

      var now = Date.now();
      if (now - lastTap < DOUBLE_TAP_MS) {
        lastTap = 0;
        if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
        invoke('floating_show_main').catch(function(){});
      } else {
        lastTap = now;
        tapTimer = setTimeout(function() {
          tapTimer = null;
          invoke('floating_toggle_timer').catch(function(){});
        }, SINGLE_TAP_DELAY);
      }
    }

    window.addEventListener('pointerup', endPress);
    window.addEventListener('pointercancel', resetPress);
    window.addEventListener('blur', resetPress);

    // ── Close button (always works regardless of lock state) ──
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      invoke('close_floating_window').catch(function(){});
    });
  </script>
</body>
</html>
